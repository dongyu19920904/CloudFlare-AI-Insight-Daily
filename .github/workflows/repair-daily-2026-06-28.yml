name: Repair Daily 2026-06-28

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repair-daily-2026-06-28.yml"
  workflow_dispatch:

jobs:
  repair-daily:
    runs-on: ubuntu-latest
    env:
      WORKER_BASE_URL: https://cloudflare-ai-lnsight-daily.sabrinamisan090.workers.dev
      FRONTEND_REPO: dongyu19920904/Hextra-AI-Insight-Daily
      TARGET_DATE: "2026-06-28"
      YEAR_MONTH: "2026-06"
    steps:
      - name: Trigger daily generation
        shell: bash
        env:
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${TEST_TRIGGER_SECRET:-}" ]; then
            echo "::error::TEST_TRIGGER_SECRET is not configured."
            exit 1
          fi

          for category in news project paper socialMedia; do
            echo "Prefetching ${category} for ${TARGET_DATE}..."
            curl -fsS -G "${WORKER_BASE_URL}/testFetchCategory" \
              --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
              --data-urlencode "date=${TARGET_DATE}" \
              --data-urlencode "category=${category}" \
              -o "prefetch-${category}.json"
            cat "prefetch-${category}.json"
            echo ""
          done

          echo "Triggering daily generation for ${TARGET_DATE}..."
          set +e
          TRIGGER_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testTriggerScheduledDaily" \
            --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
            --data-urlencode "date=${TARGET_DATE}" \
            -o trigger-response.json \
            -w "%{http_code}")
          TRIGGER_CURL_RC=$?
          set -e

          echo "Worker trigger HTTP code: ${TRIGGER_HTTP_CODE}"
          cat trigger-response.json || true
          echo ""

          if [ "$TRIGGER_CURL_RC" -ne 0 ] || [ "$TRIGGER_HTTP_CODE" != "200" ]; then
            echo "Trigger connection did not return a clean 200; polling Worker status before failing."
            for attempt in $(seq 1 72); do
              STATUS_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testTriggerScheduledStatus" \
                --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
                --data-urlencode "mode=daily" \
                --data-urlencode "date=${TARGET_DATE}" \
                -o worker-status.json \
                -w "%{http_code}" || true)

              echo "Status poll ${attempt}: HTTP ${STATUS_HTTP_CODE}"
              cat worker-status.json || true
              echo ""

              set +e
              STATUS_HTTP_CODE="${STATUS_HTTP_CODE}" python - <<'PY'
          import json
          import os

          if os.environ.get("STATUS_HTTP_CODE") != "200":
              raise SystemExit(20)

          with open("worker-status.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          status = payload.get("status") or {}
          state = status.get("state") or "missing"
          if state in {"missing", "queued", "running"}:
              raise SystemExit(20)
          if state != "success":
              raise SystemExit(f"Worker ended with state={state}: {status}")

          debug = status.get("debug") or {}
          if not debug.get("dailyGenerated", True):
              raise SystemExit(f"Daily was not generated: {debug}")
          if not debug.get("dailyPublished", True):
              raise SystemExit(f"Daily was not published: {debug}")
          PY
              CHECK_RC=$?
              set -e

              if [ "$CHECK_RC" -eq 0 ]; then
                echo "Worker status confirms success."
                exit 0
              fi
              if [ "$CHECK_RC" -ne 20 ]; then
                exit "$CHECK_RC"
              fi
              sleep 10
            done

            echo "::error::Timed out waiting for Worker status."
            exit 1
          fi

          python - <<'PY'
          import json
          with open("trigger-response.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)
          if not payload.get("success"):
              raise SystemExit(f"Worker trigger failed: {payload}")
          debug = payload.get("debug") or {}
          if debug and not debug.get("dailyPublished", True):
              raise SystemExit(f"Daily content was not published: {debug}")
          PY

      - name: Verify generated files
        shell: bash
        run: |
          set -euo pipefail

          RAW_URL="https://raw.githubusercontent.com/${FRONTEND_REPO}/main/daily/${TARGET_DATE}.md"
          PAGE_URL="https://raw.githubusercontent.com/${FRONTEND_REPO}/main/content/cn/${YEAR_MONTH}/${TARGET_DATE}.md"

          for attempt in $(seq 1 40); do
            if curl -fsSLI "$RAW_URL" >/dev/null && curl -fsSLI "$PAGE_URL" >/dev/null; then
              echo "Generated files are present."
              echo "$RAW_URL"
              echo "$PAGE_URL"
              exit 0
            fi
            echo "Waiting for generated files (${attempt}/40)..."
            sleep 15
          done

          echo "::error::Generated files did not appear."
          exit 1
