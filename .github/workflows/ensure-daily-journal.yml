name: Ensure Daily Journal

on:
  schedule:
    - cron: "11 1 * * *"
    - cron: "19 1 * * *"
    - cron: "31 1 * * *"
    - cron: "47 1 * * *"
    - cron: "17 3 * * *"
    - cron: "47 3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date in YYYY-MM-DD format"
        required: false
      force:
        description: "Force rerun only when today's page or home pointer still needs repair"
        required: false
        default: "false"
      rebuild:
        description: "Explicitly rebuild an existing daily page even when page and home are already healthy"
        required: false
        default: "false"

concurrency:
  group: ensure-daily-journal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WORKER_BASE_URL: https://cloudflare-ai-lnsight-daily.sabrinamisan090.workers.dev
      FRONTEND_REPO: dongyu19920904/Hextra-AI-Insight-Daily

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v6

      - name: Resolve target date
        id: target
        shell: bash
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            TARGET_DATE="$INPUT_DATE"
          else
            TARGET_DATE=$(TZ=Asia/Shanghai date +%F)
          fi

          echo "date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "year_month=${TARGET_DATE:0:7}" >> "$GITHUB_OUTPUT"

      - name: Check current daily page and home pointer
        id: check
        shell: bash
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          YEAR_MONTH: ${{ steps.target.outputs.year_month }}
        run: |
          PAGE_URL="https://api.github.com/repos/${FRONTEND_REPO}/contents/content/cn/${YEAR_MONTH}/${TARGET_DATE}.md"
          HOME_URL="https://api.github.com/repos/${FRONTEND_REPO}/contents/content/cn/_index.md"
          EXPECTED_HOME_NEXT="/${YEAR_MONTH}/${TARGET_DATE}"
          PAGE_STATUS_CODE=$(curl -sS -o page-check.json -w "%{http_code}" -H "User-Agent: github-actions" "$PAGE_URL")
          echo "status=$PAGE_STATUS_CODE" >> "$GITHUB_OUTPUT"

          if [ "$PAGE_STATUS_CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Today's AI daily page already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Today's AI daily page is missing."
          fi

          HOME_STATUS_CODE=$(curl -sS -o home-check.json -w "%{http_code}" -H "User-Agent: github-actions" "$HOME_URL")
          echo "home_status=$HOME_STATUS_CODE" >> "$GITHUB_OUTPUT"

          HOME_NEXT=""
          if [ "$HOME_STATUS_CODE" = "200" ]; then
            HOME_NEXT=$(python - <<'PY'
          import base64
          import json
          import re

          with open("home-check.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          content = base64.b64decode(payload["content"]).decode("utf-8")
          match = re.search(r"(?m)^next:\s*(\S+)\s*$", content)
          print(match.group(1) if match else "")
          PY
            )
          fi

          echo "home_next=$HOME_NEXT" >> "$GITHUB_OUTPUT"
          if [ "$HOME_NEXT" = "$EXPECTED_HOME_NEXT" ]; then
            echo "home_current=true" >> "$GITHUB_OUTPUT"
            echo "Home page already points to ${EXPECTED_HOME_NEXT}."
          else
            echo "home_current=false" >> "$GITHUB_OUTPUT"
            echo "Home page points to '${HOME_NEXT:-<empty>}' instead of '${EXPECTED_HOME_NEXT}'."
          fi

      - name: Skip because daily page and home are both current
        if: steps.check.outputs.exists == 'true' && steps.check.outputs.home_current == 'true' && github.event.inputs.force != 'true'
        run: echo "Skipping trigger because today's page exists and the home page already points to it."

      - name: Skip force rerun because daily page and home are already healthy
        if: steps.check.outputs.exists == 'true' && steps.check.outputs.home_current == 'true' && github.event.inputs.force == 'true' && github.event.inputs.rebuild != 'true'
        run: |
          echo "Force rerun requested, but today's page and home pointer are already current."
          echo "Skipping heavy regeneration to avoid unnecessary Worker subrequest pressure."

      - name: Repair daily home pointer from existing page
        if: steps.check.outputs.exists == 'true' && steps.check.outputs.home_current != 'true' && github.event.inputs.rebuild != 'true'
        shell: bash
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          if [ -z "$TEST_TRIGGER_SECRET" ]; then
            echo "::error::TEST_TRIGGER_SECRET is not configured in GitHub Actions. Refusing to repair the home pointer."
            exit 1
          fi

          REPAIR_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testRepairDailyHome" \
            -o repair-response.json \
            -w "%{http_code}" \
            --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
            --data-urlencode "date=${TARGET_DATE}")

          echo "Worker repair HTTP code: ${REPAIR_HTTP_CODE}"
          if [ "$REPAIR_HTTP_CODE" != "200" ]; then
            cat repair-response.json || true
            echo "::error::Worker home repair returned HTTP ${REPAIR_HTTP_CODE}."
            exit 1
          fi

          python - <<'PY'
          import json

          with open("repair-response.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          print(json.dumps(payload, ensure_ascii=False, indent=2))

          if not payload.get("success"):
              raise SystemExit("Worker home repair failed")
          PY

      - name: Trigger today's AI daily generation
        if: steps.check.outputs.exists != 'true' || github.event.inputs.rebuild == 'true'
        shell: bash
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          if [ -z "$TEST_TRIGGER_SECRET" ]; then
            echo "::error::TEST_TRIGGER_SECRET is not configured in GitHub Actions. Refusing to call Worker trigger endpoints."
            exit 1
          fi

          for category in news project paper socialMedia; do
            echo "Prefetching ${category} for ${TARGET_DATE}..."
            curl -sS -G "${WORKER_BASE_URL}/testFetchCategory" \
              --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
              --data-urlencode "date=${TARGET_DATE}" \
              --data-urlencode "category=${category}" \
              > "prefetch-${category}.json"

            python - "$category" <<'PY'
          import json
          import sys

          category = sys.argv[1]
          with open(f"prefetch-{category}.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          print(json.dumps(payload, ensure_ascii=False, indent=2))

          if not payload.get("success"):
              raise SystemExit(f"Prefetch failed for {category}")
          PY
          done

          echo "Triggering daily generation for ${TARGET_DATE}"
          set +e
          TRIGGER_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testTriggerScheduledDaily" \
            -o trigger-response.json \
            -w "%{http_code}" \
            --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
            --data-urlencode "date=${TARGET_DATE}")
          TRIGGER_CURL_RC=$?
          set -e

          echo "Worker trigger HTTP code: ${TRIGGER_HTTP_CODE}"
          if [ "$TRIGGER_CURL_RC" -ne 0 ]; then
            echo "::warning::Worker trigger request failed with curl exit ${TRIGGER_CURL_RC}; checking recorded Worker status before failing."
          elif [ "$TRIGGER_HTTP_CODE" = "200" ]; then
            python - <<'PY'
          import json

          with open("trigger-response.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          print(json.dumps(payload, ensure_ascii=False, indent=2))

          if not payload.get("success"):
              raise SystemExit("Worker trigger failed")

          debug = payload.get("debug") or {}
          if not debug.get("dailyGenerated"):
              raise SystemExit("Daily content was not generated")

          if not debug.get("dailyPublished"):
              issues = " | ".join(debug.get("dailyValidationIssues") or [])
              raise SystemExit(f"Daily content was not published: {issues}")
          PY
            exit 0
          else
            cat trigger-response.json || true
            echo "::error::Worker trigger returned HTTP ${TRIGGER_HTTP_CODE}."
            exit 1
          fi

          echo "Polling Worker status after trigger connection failure..."
          for attempt in $(seq 1 36); do
            STATUS_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testTriggerScheduledStatus" \
              -o worker-status.json \
              -w "%{http_code}" \
              --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
              --data-urlencode "mode=daily" \
              --data-urlencode "date=${TARGET_DATE}" || echo "curl_failed")

            set +e
            STATUS_HTTP_CODE="${STATUS_HTTP_CODE}" python - <<'PY'
          import json
          import os

          status_http_code = os.environ.get("STATUS_HTTP_CODE")
          if status_http_code != "200":
              print(f"Worker status is not ready (http={status_http_code})")
              raise SystemExit(20)

          with open("worker-status.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          print(json.dumps(payload, ensure_ascii=False, indent=2))

          status = payload.get("status") or {}
          state = status.get("state") or "missing"
          if state in {"missing", "queued", "running"}:
              raise SystemExit(20)

          if state != "success":
              raise SystemExit(f"Worker scheduled run ended with state: {state}; error={status.get('error') or ''}")

          debug = status.get("debug") or {}
          if not debug.get("dailyGenerated"):
              raise SystemExit("Daily content was not generated")

          if not debug.get("dailyPublished"):
              issues = " | ".join(debug.get("dailyValidationIssues") or [])
              raise SystemExit(f"Daily content was not published: {issues}")
          PY
            CHECK_RC=$?
            set -e

            if [ "$CHECK_RC" -eq 0 ]; then
              echo "Worker status confirms daily generation succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ "$CHECK_RC" -eq 20 ]; then
              echo "Worker daily status not finished on attempt ${attempt}; waiting..."
              sleep 10
              continue
            fi

            exit "$CHECK_RC"
          done

          echo "::error::Timed out waiting for Worker status after trigger connection failure."
          exit 1

      - name: Verify today's page and home pointer
        if: steps.check.outputs.exists != 'true' || steps.check.outputs.home_current != 'true' || github.event.inputs.rebuild == 'true'
        shell: bash
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          YEAR_MONTH: ${{ steps.target.outputs.year_month }}
        run: |
          PAGE_URL="https://api.github.com/repos/${FRONTEND_REPO}/contents/content/cn/${YEAR_MONTH}/${TARGET_DATE}.md"
          HOME_URL="https://api.github.com/repos/${FRONTEND_REPO}/contents/content/cn/_index.md"
          EXPECTED_HOME_NEXT="/${YEAR_MONTH}/${TARGET_DATE}"

          for attempt in 1 2 3 4 5; do
            PAGE_STATUS_CODE=$(curl -sS -o verify-page.json -w "%{http_code}" -H "User-Agent: github-actions" "$PAGE_URL")
            HOME_STATUS_CODE=$(curl -sS -o verify-home.json -w "%{http_code}" -H "User-Agent: github-actions" "$HOME_URL")

            HOME_NEXT=""
            if [ "$HOME_STATUS_CODE" = "200" ]; then
              HOME_NEXT=$(python - <<'PY'
          import base64
          import json
          import re

          with open("verify-home.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          content = base64.b64decode(payload["content"]).decode("utf-8")
          match = re.search(r"(?m)^next:\s*(\S+)\s*$", content)
          print(match.group(1) if match else "")
          PY
              )
            fi

            if [ "$PAGE_STATUS_CODE" = "200" ] && [ "$HOME_NEXT" = "$EXPECTED_HOME_NEXT" ]; then
              echo "Verified today's AI daily page and home pointer on attempt ${attempt}."
              exit 0
            fi

            echo "Daily page or home pointer not ready on attempt ${attempt} (page=${PAGE_STATUS_CODE}, home_next='${HOME_NEXT:-<empty>}'), waiting..."
            sleep 8
          done

          echo "Today's AI daily page or home pointer is still not updated after trigger."
          exit 1

      - name: Validate current daily page content
        id: validate_page
        shell: bash
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          YEAR_MONTH: ${{ steps.target.outputs.year_month }}
        run: |
          PAGE_URL="https://api.github.com/repos/${FRONTEND_REPO}/contents/content/cn/${YEAR_MONTH}/${TARGET_DATE}.md"
          STATUS_CODE=$(curl -sS -o publication-page.json -w "%{http_code}" -H "User-Agent: github-actions" "$PAGE_URL")
          if [ "$STATUS_CODE" != "200" ]; then
            echo "::error::Unable to fetch daily page content for validation (status=${STATUS_CODE})."
            exit 1
          fi

          MODE=daily \
          TARGET_DATE="${TARGET_DATE}" \
          PAGE_RESPONSE_PATH=publication-page.json \
          MINIMUM_TOP_ITEMS=3 \
          node .github/scripts/validate-publication-content.mjs
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Report Worker daily status
        if: always()
        shell: bash
        env:
          MODE: daily
          TARGET_DATE: ${{ steps.target.outputs.date }}
          PAGE_HEALTH: ${{ steps.validate_page.outputs.ok == 'true' && 'healthy' || 'needs-repair' }}
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          STATUS_HTTP_CODE="not_requested"
          if [ -z "$TEST_TRIGGER_SECRET" ]; then
            echo "::warning::TEST_TRIGGER_SECRET is not configured; skipping Worker status report."
          else
            STATUS_HTTP_CODE=$(curl -sS -G "${WORKER_BASE_URL}/testTriggerScheduledStatus" \
              -o worker-status.json \
              -w "%{http_code}" \
              --data-urlencode "key=${TEST_TRIGGER_SECRET}" \
              --data-urlencode "mode=${MODE}" \
              --data-urlencode "date=${TARGET_DATE}" || echo "curl_failed")
          fi

          echo "Worker status HTTP code: ${STATUS_HTTP_CODE}"
          STATUS_HTTP_CODE="${STATUS_HTTP_CODE}" python .github/scripts/summarize-worker-status.py
