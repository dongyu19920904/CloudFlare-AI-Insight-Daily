name: Temp Verify Folo Cookie

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Verify deployed Folo cookie endpoint
        shell: bash
        env:
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
          WORKER_BASE_URL: https://cloudflare-ai-lnsight-daily.sabrinamisan090.workers.dev
        run: |
          set -euo pipefail
          curl -sS "${WORKER_BASE_URL}/testFoloCookie?key=${TEST_TRIGGER_SECRET}" | tee response.json
          python3 - <<'PY'
          import json
          data = json.load(open("response.json", encoding="utf-8"))
          print(json.dumps(data, ensure_ascii=False, indent=2))
          if not data.get("success"):
              raise SystemExit(1)
          PY
