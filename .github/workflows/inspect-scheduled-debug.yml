name: Inspect Scheduled Debug
on:
  workflow_dispatch:
    inputs:
      date:
        description: inspect date
        required: true
        default: "2026-03-11"
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger worker and print body
        run: |
          set -euo pipefail
          DATE='${{ github.event.inputs.date }}'
          URL="https://cloudflare-ai-lnsight-daily.sabrinamisan090.workers.dev/testTriggerScheduled?key=test-secret-key-change-me&date=${DATE}"
          code=$(curl -sS -D headers.txt -o body.txt -w "%{http_code}" "$URL" || true)
          echo "HTTP_CODE=$code"
          echo "--- headers ---"
          cat headers.txt || true
          echo "--- body ---"
          cat body.txt || true