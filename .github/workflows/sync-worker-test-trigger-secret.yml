name: Sync Worker Test Trigger Secret

on:
  workflow_dispatch:

jobs:
  sync-secret:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync TEST_TRIGGER_SECRET to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.59.2"
          command: secret put TEST_TRIGGER_SECRET --text "${{ secrets.TEST_TRIGGER_SECRET }}"
