name: Sync Worker Test Trigger Secret

on:
  workflow_dispatch:

jobs:
  sync-secret:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm i wrangler@4.59.2

      - name: Sync TEST_TRIGGER_SECRET to Cloudflare Worker
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TEST_TRIGGER_SECRET: ${{ secrets.TEST_TRIGGER_SECRET }}
        run: |
          printf "%s" "$TEST_TRIGGER_SECRET" | npx wrangler secret put TEST_TRIGGER_SECRET
