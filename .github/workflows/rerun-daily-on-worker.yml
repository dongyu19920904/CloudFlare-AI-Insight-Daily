name: Rerun Daily On Worker

on:
  workflow_dispatch:
    inputs:
      date:
        description: target date
        required: true
        default: '2026-03-11'

jobs:
  rerun:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger worker
        env:
          TARGET_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          url="https://cloudflare-ai-lnsight-daily.sabrinamisan090.workers.dev/testTriggerScheduled?key=test-secret-key-change-me&date=${TARGET_DATE}"
          echo "Triggering: ${url}"
          curl -sS --fail "$url" | tee trigger.json
          python - <<'PY'
from pathlib import Path
import json
print(json.loads(Path('trigger.json').read_text(encoding='utf-8')))
PY

      - name: Wait for sync
        run: sleep 20

      - name: Fetch generated file
        env:
          TARGET_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          curl -sS --fail -L "https://raw.githubusercontent.com/dongyu19920904/Hextra-AI-Insight-Daily/main/daily/${TARGET_DATE}.md" -o daily.md
          python - <<'PY'
from pathlib import Path
import re
text = Path('daily.md').read_text(encoding='utf-8')
headings = re.findall(r'(?m)^#{2,3}\s+.*$', text)
summary = {
  'heading_count': len(headings),
  'headings': headings,
  'has_top10': 'TOP 10' in text,
  'has_today_ai': ('今日 AI 资讯' in text) or ('今日AI资讯' in text),
  'has_worthy': '值得关注' in text,
  'has_fun': 'AI趣闻' in text,
  'has_trend': 'AI趋势预测' in text,
  'has_questions': '相关问题' in text,
  'image_count': len(re.findall(r'!\[[^\]]*\]\([^)]+\)', text)),
  'has_bad': any(s in text for s in ['素材质量不足','无法生成','请补充素材','请提供完整 Markdown','如果你想让我','我需要你提供'])
}
print(summary)
print('---FILE_HEAD---')
print('\n'.join(text.splitlines()[:120]))
PY
